<style>
:root {
  --bg: #0b0f1a; --card: #111827; --card2: #1a2236; --border: #1f2937;
  --text: #cbd5e1; --muted: #6b7280; --white: #f1f5f9;
  --green: #4ade80; --red: #f87171; --orange: #fb923c;
  --blue: #60a5fa; --purple: #a78bfa; --yellow: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: -webkit-fill-available; padding-bottom: env(safe-area-inset-bottom, 16px); }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: var(--card); }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

/* Header */
.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 14px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.logo { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, #22c55e, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 900; color: white; flex-shrink: 0; }
.app-name { flex: 1; min-width: 100px; }
.app-name h1 { font-size: 14px; font-weight: 700; color: var(--white); line-height: 1.2; }
.app-name span { font-size: 10px; color: var(--muted); }
.month-nav { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.nav-arrow { width: 28px; height: 28px; background: var(--card2); border: 1px solid var(--border); border-radius: 7px; color: var(--white); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
.nav-arrow:disabled { opacity: 0.3; }
select.month-sel { background: var(--card2); color: var(--white); border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px; font-size: 12px; cursor: pointer; outline: none; }
.add-month { background: var(--card2); color: var(--text); border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.tabs { display: flex; gap: 3px; }
.tab { padding: 5px 11px; border-radius: 7px; font-size: 11px; border: none; cursor: pointer; background: var(--card2); color: var(--muted); touch-action: manipulation; transition: all .15s; }
.tab.active { background: #2563eb; color: white; }
.install-btn { background: linear-gradient(135deg, #7c3aed, #2563eb); color: white; border: none; border-radius: 7px; padding: 5px 11px; font-size: 11px; cursor: pointer; display: none; align-items: center; gap: 4px; white-space: nowrap; }
.install-btn.visible { display: flex; }
.ios-hint { background: #1e3a5f; border: 1px solid #3b82f6; border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; font-size: 11px; color: #93c5fd; display: none; }
.ios-hint.visible { display: block; }

/* Layout */
.main { max-width: 900px; margin: 0 auto; padding: 12px 12px; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 10px; }
@media(max-width:580px){ .stats-grid { grid-template-columns: repeat(2,1fr); } }
.stat { background: var(--card); border-radius: 12px; padding: 11px 12px; border-left: 3px solid; }
.stat-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
.stat-value { font-size: 17px; font-weight: 700; font-family: 'Courier New', monospace; }

/* Progress */
.progress-card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.prog-title { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 7px; }
.prog-bar { height: 10px; background: #1f2937; border-radius: 5px; overflow: hidden; display: flex; }
.prog-seg { transition: width .4s; }
.prog-legend { display: flex; gap: 12px; margin-top: 7px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle; }

/* 3-col grid */
.col3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
@media(max-width:640px){ .col3 { grid-template-columns: 1fr; } }

/* Section cards */
.sec-card { background: var(--card); border-radius: 14px; padding: 12px; border-top: 3px solid; }
.sec-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
.sec-title { font-size: 12px; font-weight: 700; color: var(--white); }
.sec-total { font-size: 13px; font-weight: 700; font-family: monospace; }
.items { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 1px; }
.item { display: flex; align-items: center; justify-content: space-between; padding: 4px 5px; border-radius: 7px; }
.item:hover { background: var(--card2); }
.item-name { font-size: 11px; color: #94a3b8; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 6px; }
.item-right { display: flex; align-items: center; gap: 3px; }
.item-amt { font-size: 11px; font-family: monospace; cursor: pointer; padding: 2px 5px; border-radius: 5px; transition: background .1s; white-space: nowrap; }
.item-amt:hover { background: #374151; color: white; }
.del { color: #f87171; font-size: 10px; cursor: pointer; background: none; border: none; opacity: 0; padding: 0 2px; transition: opacity .15s; }
.item:hover .del { opacity: 1; }
.edit-in { width: 70px; background: #374151; color: white; border: 1px solid #3b82f6; border-radius: 5px; padding: 2px 5px; font-size: 11px; font-family: monospace; outline: none; text-align: right; }
.add-row { display: flex; gap: 4px; margin-top: 8px; }
.add-row input { flex: 1; background: var(--card2); color: white; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 11px; outline: none; min-width: 0; }
.add-row input:focus { border-color: #3b82f6; }
.add-row input[type=number] { width: 72px; flex: none; }
.btn-ok { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 5px 9px; font-size: 11px; cursor: pointer; }
.btn-cancel { background: #374151; color: var(--text); border: none; border-radius: 6px; padding: 5px 9px; font-size: 11px; cursor: pointer; }
.add-trig { margin-top: 7px; font-size: 10px; color: var(--muted); cursor: pointer; padding: 3px 6px; border-radius: 6px; background: none; border: none; transition: all .1s; touch-action: manipulation; }
.add-trig:hover { background: var(--card2); color: var(--text); }

/* Charts */
.chart-card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.chart-title { font-size: 12px; font-weight: 700; color: var(--white); margin-bottom: 12px; }
.chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 160px; padding: 0; overflow-x: auto; }
.bar-group { flex: 1; min-width: 28px; display: flex; flex-direction: column; align-items: center; gap: 0; }
.bar-cols { display: flex; align-items: flex-end; gap: 1px; height: 140px; width: 100%; }
.bar-col { flex: 1; border-radius: 2px 2px 0 0; min-height: 2px; transition: height .3s; cursor: pointer; }
.bar-label { font-size: 8px; color: var(--muted); margin-top: 3px; text-align: center; }
.line-chart { position: relative; height: 90px; margin: 0 4px; }
.line-chart svg { width: 100%; height: 100%; }
.avgs { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
@media(max-width:580px){ .avgs { grid-template-columns: repeat(2,1fr); } }

/* Debts */
.debt-item { background: var(--card2); border-radius: 11px; padding: 11px; margin-bottom: 7px; }
.debt-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.debt-name { font-size: 12px; font-weight: 600; color: var(--white); }
.debt-meta { display: flex; gap: 12px; font-size: 10px; color: var(--muted); margin-bottom: 7px; flex-wrap: wrap; }
.debt-prog { height: 4px; background: #374151; border-radius: 2px; overflow: hidden; }
.debt-fill { height: 100%; background: var(--purple); border-radius: 2px; }
.debt-del { color: var(--red); cursor: pointer; font-size: 11px; background: none; border: none; opacity: 0; padding: 0 3px; }
.debt-item:hover .debt-del { opacity: 1; }
.debt-form { background: var(--card2); border-radius: 11px; padding: 12px; margin-top: 8px; }
.debt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
.debt-grid input { background: #374151; color: white; border: 1px solid #4b5563; border-radius: 7px; padding: 7px 9px; font-size: 11px; outline: none; }
.debt-grid input:focus { border-color: var(--purple); }
.debt-grid .span2 { grid-column: 1/-1; }
.btn-purple { background: #7c3aed; color: white; border: none; border-radius: 7px; padding: 7px 16px; font-size: 11px; cursor: pointer; }
.debt-hist th { color: var(--muted); font-size: 10px; padding: 4px 8px; font-weight: 500; text-align: right; }
.debt-hist th:first-child { text-align: left; }
.debt-hist td { padding: 5px 8px; font-size: 11px; text-align: right; cursor: pointer; }
.debt-hist td:first-child { text-align: left; color: var(--text); }
.debt-hist tr:hover td { background: var(--card2); }

/* Toast */
.toast { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom,0px)); left: 50%; transform: translateX(-50%) translateY(80px); background: #1e3a5f; border: 1px solid #3b82f6; color: #93c5fd; padding: 10px 20px; border-radius: 20px; font-size: 12px; transition: transform .3s; z-index: 999; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* Version badge */
.ver { font-size: 9px; color: #374151; background: #1f2937; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
</style>
</head>

});

  if (deferredPrompt) {

// ─── State ────────────────────────────────────────────────────────────────────
let DATA = JSON.parse(JSON.stringify(INITIAL));
let selMonth = '04_26';
let curView = 'month';
let editing = null;
let addSec = null;
let addDebtMode = false;

// ─── Storage ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    if (window.storage) {
      const r = await window.storage.get('budget_v1_1');
      if (r) DATA = JSON.parse(r.value);
    } else {
      const s = localStorage.getItem('budget_v1_1');
      if (s) DATA = JSON.parse(s);
    }
  } catch(e) {}
}
async function saveData() {
  const s = JSON.stringify(DATA);
  try {
    if (window.storage) await window.storage.set('budget_v1_1', s);
    localStorage.setItem('budget_v1_1', s);
  } catch(e) {
    try { localStorage.setItem('budget_v1_1', s); } catch(e2) {}
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function pk(k) { const [m,y]=k.split('_'); return {m:+m, y:2000+(+y)}; }
function sortKeys(ks) { return [...ks].sort((a,b)=>{ const pa=pk(a),pb=pk(b); return pa.y!==pb.y?pa.y-pb.y:pa.m-pb.m; }); }
function fmtKey(k) { const {m,y}=pk(k); return MONTH_NAMES[m-1]+' '+y; }
function fmtN(n) { return (n||0).toLocaleString('ru-RU')+'₪'; }
function S(o) { return Object.values(o||{}).reduce((s,v)=>s+(+v||0),0); }
function getMD() { return DATA[selMonth]||{income:{},fixed:{},variable:{},debts:[],edp_target:15000}; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ─── Build month selector ─────────────────────────────────────────────────────
function buildSelector() {
  const ms = sortKeys(Object.keys(DATA));
  const sel = document.getElementById('monthSel');
  sel.innerHTML = [...ms].reverse().map(k=>`<option value="${k}"${k===selMonth?' selected':''}>${fmtKey(k)}</option>`).join('');
  document.getElementById('prevBtn').disabled = ms.indexOf(selMonth) === 0;
  document.getElementById('nextBtn').disabled = ms.indexOf(selMonth) === ms.length-1;
  document.getElementById('monthCount').textContent = ms.length + ' месяцев';
}

// ─── Render Stats ─────────────────────────────────────────────────────────────
function renderStats() {
  const md = getMD();
  const tI=S(md.income), tF=S(md.fixed), tV=S(md.variable), bal=tI-tF-tV;
  document.getElementById('statsGrid').innerHTML = [
    ['Доходы',tI,C.income,'↑'],['Постоянные',tF,C.fixed,'🏠'],['Переменные',tV,C.variable,'🛒'],
    ['Остаток',bal,bal>=0?C.balance:'#ef4444',bal>=0?'✓':'⚠']
  ].map(([l,v,c,i])=>`<div class="stat" style="border-left-color:${c}">
    <div class="stat-label">${i} ${l}</div>
    <div class="stat-value" style="color:${c}">${fmtN(v)}</div>
  </div>`).join('');
}

// ─── Render Section ───────────────────────────────────────────────────────────
function secHTML(sec, title, color, items, total) {
  const rows = Object.entries(items).map(([k,v]) => {
    const isEdit = editing && editing.sec===sec && editing.key===k;
    const safeKey = encodeURIComponent(k);
    return `<div class="item">
      <span class="item-name" title="${k}">${k}</span>
      <div class="item-right">
        ${isEdit
          ? `<input class="edit-in" id="editIn" type="number" value="${v||0}"/>`
          : `<span class="item-amt" style="color:${color}" data-sec="${sec}" data-key="${safeKey}">${fmtN(v||0)}</span>`
        }
        <button class="del" data-dsec="${sec}" data-dkey="${safeKey}">✕</button>
      </div>
    </div>`;
  }).join('');

  const addForm = addSec === sec
    ? `<div class="add-row">
        <input id="aiName" placeholder="Название"/>
        <input id="aiVal" type="number" placeholder="Сумма"/>
        <button class="btn-ok" data-aok="${sec}">✓</button>
        <button class="btn-cancel" id="aiCancel">✕</button>
       </div>`
    : `<button class="add-trig" data-asec="${sec}">+ Добавить</button>`;

  return `<div class="sec-card" style="border-top-color:${color}">
    <div class="sec-head">
      <div class="sec-title">${title}</div>
      <div class="sec-total" style="color:${color}">${fmtN(total)}</div>
    </div>
    <div class="items">${rows}</div>
    ${addForm}
  </div>`;
}

// ─── Render Month ─────────────────────────────────────────────────────────────
function renderMonth() {
  const md=getMD(), tI=S(md.income), tF=S(md.fixed), tV=S(md.variable);
  const pct=(v,t)=>t>0?Math.min((v/t)*100,100):0;
  document.getElementById('mainContent').innerHTML = `
    <div class="progress-card">
      <div class="prog-title"><span>Распределение расходов — ${fmtKey(selMonth)}</span><span>${tI>0?Math.round(((tF+tV)/tI)*100):0}% от дохода</span></div>
      <div class="prog-bar">
        <div class="prog-seg" style="width:${pct(tF,tI)}%;background:${C.fixed}"></div>
        <div class="prog-seg" style="width:${pct(tV,tI)}%;background:${C.variable}"></div>
      </div>
      <div class="prog-legend">
        <span><span class="dot" style="background:${C.fixed}"></span>Пост.: ${fmtN(tF)}</span>
        <span><span class="dot" style="background:${C.variable}"></span>Перем.: ${fmtN(tV)}</span>
        <span><span class="dot" style="background:${C.income}"></span>Доход: ${fmtN(tI)}</span>
      </div>
    </div>
    <div class="col3">
      ${secHTML('income','💰 Доходы',C.income,md.income,tI)}
      ${secHTML('fixed','🏠 Постоянные',C.fixed,md.fixed,tF)}
      ${secHTML('variable','🛒 Переменные',C.variable,md.variable,tV)}
    </div>`;
  bindMonthEvents();
}

function bindMonthEvents() {
  // Edit amount
  document.querySelectorAll('.item-amt').forEach(el => {
    el.addEventListener('click', () => {
      editing = {sec:el.dataset.sec, key:decodeURIComponent(el.dataset.key)};
      renderMonth(); renderStats();
      setTimeout(()=>{ const i=document.getElementById('editIn'); if(i){i.focus();i.select();} },50);
    });
  });
  // Commit edit
  const ei = document.getElementById('editIn');
  if (ei) {
    const commit = () => {
      if (!editing) return;
      const md = getMD();
      DATA[selMonth] = {...md, [editing.sec]: {...md[editing.sec], [editing.key]: parseFloat(ei.value)||0}};
      editing = null; saveData(); renderMonth(); renderStats();
    };
    ei.addEventListener('blur', commit);
    ei.addEventListener('keydown', e => { if(e.key==='Enter') commit(); if(e.key==='Escape'){editing=null;renderMonth();} });
  }
  // Delete item
  document.querySelectorAll('[data-dsec]').forEach(btn => {
    btn.addEventListener('click', () => {
      const sec=btn.dataset.dsec, key=decodeURIComponent(btn.dataset.dkey);
      const md=getMD(), ns={...md[sec]};
      delete ns[key];
      DATA[selMonth]={...md,[sec]:ns};
      saveData(); renderMonth(); renderStats();
      showToast('🗑 Удалено: '+key);
    });
  });
  // Add section trigger
  document.querySelectorAll('[data-asec]').forEach(btn => {
    btn.addEventListener('click', () => { addSec=btn.dataset.asec; renderMonth(); setTimeout(()=>document.getElementById('aiName')?.focus(),50); });
  });
  document.getElementById('aiCancel')?.addEventListener('click', ()=>{ addSec=null; renderMonth(); });
  document.querySelectorAll('[data-aok]').forEach(btn => {
    btn.addEventListener('click', () => {
      const sec=btn.dataset.aok, name=document.getElementById('aiName')?.value.trim(), val=parseFloat(document.getElementById('aiVal')?.value)||0;
      if (!name) return;
      const md=getMD();
      DATA[selMonth]={...md,[sec]:{...md[sec],[name]:val}};
      addSec=null; saveData(); renderMonth(); renderStats();
      showToast('✅ Добавлено: '+name);
    });
  });
}

// ─── Render Trends ─────────────────────────────────────────────────────────────
function renderTrends() {
  const keys = sortKeys(Object.keys(DATA)).slice(-12);
  const td = keys.map(k => {
    const d=DATA[k], i=S(d.income), f=S(d.fixed), v=S(d.variable);
    return {lbl:fmtKey(k).split(' ')[0].slice(0,3), full:fmtKey(k), income:i, fixed:f, variable:v, balance:i-f-v};
  });
  const maxV = Math.max(...td.map(d=>d.income), 1);

  // Build bars
  const bars = td.map(d => {
    const h=(v)=>Math.max(2,Math.round((v/maxV)*130));
    return `<div class="bar-group" title="${d.full}&#10;Доход: ${fmtN(d.income)}&#10;Пост.: ${fmtN(d.fixed)}&#10;Перем.: ${fmtN(d.variable)}">
      <div class="bar-cols">
        <div class="bar-col" style="height:${h(d.income)}px;background:${C.income}"></div>
        <div class="bar-col" style="height:${h(d.fixed)}px;background:${C.fixed}"></div>
        <div class="bar-col" style="height:${h(d.variable)}px;background:${C.variable}"></div>
      </div>
      <div class="bar-label">${d.lbl}</div>
    </div>`;
  }).join('');

  // Line chart
  const bals = td.map(d=>d.balance);
  const minB=Math.min(...bals), maxB=Math.max(...bals), rng=maxB-minB||1;
  const pts = td.map((d,i)=>`${(i/(td.length-1||1))*100},${90-((d.balance-minB)/rng)*80}`).join(' ');
  const circles = td.map((d,i)=>{
    const cx=(i/(td.length-1||1))*100, cy=90-((d.balance-minB)/rng)*80;
    return `<circle cx="${cx}" cy="${cy}" r="3" fill="${d.balance>=0?C.balance:'#ef4444'}"><title>${d.full}: ${fmtN(d.balance)}</title></circle>`;
  }).join('');

  const avg = arr => Math.round(arr.reduce((s,v)=>s+v,0)/arr.length);
  const avgs = [
    ['Средний доход', avg(td.map(d=>d.income)), C.income],
    ['Пост. расходы', avg(td.map(d=>d.fixed)), C.fixed],
    ['Перем. расходы', avg(td.map(d=>d.variable)), C.variable],
    ['Ср. остаток',   avg(td.map(d=>d.balance)), C.balance],
  ];

  document.getElementById('mainContent').innerHTML = `
    <div class="chart-card">
      <div class="chart-title">📊 Доходы и расходы (последние ${keys.length} мес.)</div>
      <div style="overflow-x:auto">
        <div class="chart-bars" style="min-width:${keys.length*40}px">${bars}</div>
      </div>
      <div class="prog-legend" style="margin-top:10px">
        <span><span class="dot" style="background:${C.income}"></span>Доходы</span>
        <span><span class="dot" style="background:${C.fixed}"></span>Постоянные</span>
        <span><span class="dot" style="background:${C.variable}"></span>Переменные</span>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📈 Остаток по месяцам</div>
      <div class="line-chart">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="overflow:visible">
          <line x1="0" y1="${90-((0-minB)/rng)*80}" x2="100" y2="${90-((0-minB)/rng)*80}" stroke="#374151" stroke-width="0.3" stroke-dasharray="2,2"/>
          <polyline points="${pts}" fill="none" stroke="${C.balance}" stroke-width="0.8" vector-effect="non-scaling-stroke"/>
          ${circles}
        </svg>
      </div>
      <div class="prog-legend" style="margin-top:8px">
        ${td.map(d=>`<span style="font-size:9px;color:var(--muted)">${d.lbl}</span>`).join(' ')}
      </div>
    </div>
    <div class="avgs">
      ${avgs.map(([l,v,c])=>`<div class="stat" style="border-left-color:${c}"><div class="stat-label">${l}</div><div class="stat-value" style="color:${c};font-size:14px">${fmtN(v)}</div></div>`).join('')}
    </div>`;
}

// ─── Render Debts ─────────────────────────────────────────────────────────────
function renderDebts() {
  const md=getMD(), debts=md.debts||[];
  const totalDebt=debts.reduce((s,d)=>s+(d.total||0),0);
  const debtRows = debts.map((d,i)=>{
    const prog=Math.max(0,100-(d.payments_left/(d.payments_left+1))*100);
    return `<div class="debt-item">
      <div class="debt-head">
        <span class="debt-name">${d.name}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-family:monospace;color:${C.debt}">${fmtN(d.total)}</span>
          <button class="debt-del" data-di="${i}">✕</button>
        </div>
      </div>
      <div class="debt-meta">
        <span>Осталось выплат: <b style="color:white">${d.payments_left}</b></span>
        <span>В месяц: <b style="color:white;font-family:monospace">${fmtN(d.monthly)}</b></span>
      </div>
      <div class="debt-prog"><div class="debt-fill" style="width:${prog}%"></div></div>
    </div>`;
  }).join('');

  const debtForm = addDebtMode
    ? `<div class="debt-form">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Новый долг</div>
        <div class="debt-grid">
          <input id="dName" placeholder="Название" class="span2"/>
          <input id="dTotal" type="number" placeholder="Сумма долга"/>
          <input id="dMonthly" type="number" placeholder="Платёж в месяц"/>
          <input id="dLeft" type="number" placeholder="Кол-во выплат"/>
        </div>
        <button class="btn-purple" id="dOK">Добавить</button>
        <button class="btn-cancel" id="dCancel" style="margin-left:6px">Отмена</button>
       </div>`
    : `<button class="add-trig" id="addDebtBtn">+ Добавить долг</button>`;

  // Debt history
  const histKeys = sortKeys(Object.keys(DATA)).filter(k=>(DATA[k].debts||[]).length>0).slice(-12).reverse();
  const histRows = histKeys.map(k=>{
    const tot=(DATA[k].debts||[]).reduce((s,d)=>s+(d.total||0),0);
    return `<tr data-hm="${k}"><td>${fmtKey(k)}</td><td>${DATA[k].debts.length}</td><td style="color:${C.debt};font-family:monospace">${fmtN(tot)}</td></tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="sec-card" style="border-top-color:${C.debt};margin-bottom:10px">
      <div class="sec-head">
        <div class="sec-title">💳 Долги — ${fmtKey(selMonth)}</div>
        <div class="sec-total" style="color:${C.debt}">${fmtN(totalDebt)}</div>
      </div>
      ${debts.length===0?'<p style="color:var(--muted);font-size:12px;text-align:center;padding:16px 0">Нет долгов в этом месяце</p>':''}
      ${debtRows}
      ${debtForm}
    </div>
    <div class="chart-card">
      <div class="chart-title">📅 История долгов по месяцам</div>
      <div style="overflow-x:auto">
        <table class="debt-hist" style="width:100%;border-collapse:collapse">
          <thead><tr><th>Месяц</th><th>Кол-во</th><th>Сумма</th></tr></thead>
          <tbody>${histRows}</tbody>
        </table>
      </div>
    </div>`;

  bindDebtEvents(md);
}

function bindDebtEvents(md) {
  document.querySelectorAll('[data-di]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=+btn.dataset.di;
      DATA[selMonth]={...md,debts:md.debts.filter((_,di)=>di!==i)};
      saveData(); renderDebts(); renderStats();
    });
  });
  document.getElementById('addDebtBtn')?.addEventListener('click',()=>{addDebtMode=true;renderDebts();setTimeout(()=>document.getElementById('dName')?.focus(),50);});
  document.getElementById('dCancel')?.addEventListener('click',()=>{addDebtMode=false;renderDebts();});
  document.getElementById('dOK')?.addEventListener('click',()=>{
    const name=document.getElementById('dName')?.value.trim();
    if (!name) return;
    const d={name,total:parseFloat(document.getElementById('dTotal')?.value)||0,monthly:parseFloat(document.getElementById('dMonthly')?.value)||0,payments_left:parseInt(document.getElementById('dLeft')?.value)||0};
    DATA[selMonth]={...md,debts:[...(md.debts||[]),d]};
    addDebtMode=false; saveData(); renderDebts(); renderStats();
    showToast('✅ Долг добавлен: '+name);
  });
  document.querySelectorAll('[data-hm]').forEach(row=>{
    row.addEventListener('click',()=>{selMonth=row.dataset.hm;buildSelector();renderStats();renderDebts();});
  });
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderView() {
  renderStats();
  if (curView==='month') renderMonth();
  else if (curView==='trends') renderTrends();
  else if (curView==='debts') renderDebts();
}

// ─── Events ───────────────────────────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click',()=>{
  const ms=sortKeys(Object.keys(DATA)), i=ms.indexOf(selMonth);
  if(i>0){selMonth=ms[i-1];editing=null;buildSelector();renderView();}
});
document.getElementById('nextBtn').addEventListener('click',()=>{
  const ms=sortKeys(Object.keys(DATA)), i=ms.indexOf(selMonth);
  if(i<ms.length-1){selMonth=ms[i+1];editing=null;buildSelector();renderView();}
});
document.getElementById('monthSel').addEventListener('change',e=>{selMonth=e.target.value;editing=null;renderView();});
document.getElementById('addMonthBtn').addEventListener('click',()=>{
  const ms=sortKeys(Object.keys(DATA)), latest=ms[ms.length-1];
  const {m,y}=pk(latest);
  let nm=m+1,ny=y; if(nm>12){nm=1;ny++;}
  const key=String(nm).padStart(2,'0')+'_'+String(ny-2000).padStart(2,'0');
  if(DATA[key]){showToast('⚠ Месяц уже существует');return;}
  const base=DATA[latest];
  DATA[key]={income:{...base.income},fixed:{...base.fixed},variable:Object.fromEntries(Object.keys(base.variable).map(k=>[k,0])),debts:[],edp_target:base.edp_target||15000};
  selMonth=key; saveData(); buildSelector(); renderView();
  showToast('✅ Создан: '+fmtKey(key));
});
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    curView=t.dataset.view; editing=null; addSec=null; addDebtMode=false;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    renderView();
  });
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadData().then(()=>{ buildSelector(); renderView(); });
</script>
</body>
</html>
